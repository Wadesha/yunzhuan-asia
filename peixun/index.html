<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>职业资格考试 · 刷题目录</title>
<style>
:root{
  --ink:#1c1c1e; --ink-soft:#3a3a3e; --muted:#76767c;
  --line:#d9d9d4; --paper:#ffffff; --bg:#f3f2ee;
  --accent:#2f4858; --accent-2:#5b7384; --accent-bg:#eef1f3;
  --ok:#3f7d4f; --ok-bg:#eaf3ec; --no:#a23b2e; --no-bg:#f6ece9;
  --max:980px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.shell{max-width:var(--max);margin:0 auto;padding:0 24px;}
.site-head{background:var(--paper);border-bottom:1px solid var(--line);}
.site-head .shell{display:flex;align-items:baseline;justify-content:space-between;padding:18px 24px;flex-wrap:wrap;gap:8px;}
.brand{display:flex;align-items:center;gap:14px;}
.brand .mark{font-family:Georgia,"Times New Roman",serif;font-weight:700;font-size:20px;letter-spacing:2px;
  color:var(--paper);background:var(--accent);border:1px solid var(--accent);padding:6px 10px;line-height:1;}
.brand .names{line-height:1.25;}
.brand .zh{font-size:18px;font-weight:700;letter-spacing:1px;}
.brand .en{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.head-right{display:flex;align-items:center;gap:14px;}
.user-badge{font-size:13px;color:var(--muted);letter-spacing:.5px;}
.tagline{font-size:13px;color:var(--muted);letter-spacing:1px;}
.wrap{max-width:var(--max);margin:0 auto;padding:30px 24px 60px;}
.page-title{font-size:26px;letter-spacing:1px;margin:0 0 4px;font-family:Georgia,"Noto Serif SC",serif;}
.page-sub{color:var(--muted);font-size:14px;margin:0 0 26px;}
.crumb{font-size:13px;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;}
.crumb a:hover{color:var(--accent);}
.section-h{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--accent-2);
  margin:30px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.card{display:block;background:var(--paper);border:1px solid var(--line);padding:20px 20px;transition:border-color .15s,transform .15s;}
.card:hover{border-color:var(--accent);transform:translateY(-2px);}
.card .ct{font-size:17px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
.card .cd{font-size:13.5px;color:var(--ink-soft);min-height:40px;line-height:1.55;}
.card .cm{margin-top:12px;font-size:13px;color:var(--accent);letter-spacing:.5px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{font-size:13px;padding:6px 14px;border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);}
.chip.on{background:var(--accent-bg);border-color:var(--accent-2);}
.acts{margin-top:22px;display:flex;gap:12px;flex-wrap:wrap;}
.btn{display:inline-block;font-size:14px;letter-spacing:.5px;padding:10px 22px;border:1px solid var(--accent);
  color:var(--accent);background:var(--paper);cursor:pointer;font-family:inherit;}
.btn:hover{background:var(--accent);color:var(--paper);}
.btn.primary{background:var(--accent);color:var(--paper);}
.btn.primary:hover{background:var(--accent-2);border-color:var(--accent-2);}
.btn.ghost{border-color:var(--line);color:var(--muted);}
.btn.ghost:hover{background:var(--muted);color:var(--paper);border-color:var(--muted);}
.btn.read{display:inline-block;margin:0 0 14px;padding:8px 16px;font-size:13px;border-color:var(--accent-2);color:var(--accent-2);}
.btn.read:hover{background:var(--accent-2);color:var(--paper);}
.btn.read.on{background:var(--accent-2);color:var(--paper);}
.bar{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.bar .meta{font-size:13px;color:var(--muted);letter-spacing:1px;}
.bar .score{font-size:13px;color:var(--accent);letter-spacing:.5px;}
.prog{height:4px;background:var(--line);margin-bottom:22px;}
.prog .fill{height:100%;background:var(--accent);transition:width .2s;}
.q{background:var(--paper);border:1px solid var(--line);padding:24px 26px;}
.qt{font-size:17px;font-weight:600;line-height:1.6;margin-bottom:18px;}
.hint{font-size:12px;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;}
.modnav{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 18px;}
.modnav a{font-size:13.5px;color:var(--accent);border:1px solid var(--line);padding:7px 15px;letter-spacing:.5px;}
.modnav a:hover{background:var(--accent);color:var(--paper);border-color:var(--accent);}
.modnav .cur{font-size:13.5px;color:var(--muted);border:1px dashed var(--line);padding:7px 15px;}
.notebox{background:var(--accent-bg);border:1px solid var(--line);padding:12px 16px;font-size:13px;color:var(--ink-soft);margin:0 0 22px;line-height:1.75;}
.notebox b{color:var(--accent);font-weight:600;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);
  background:var(--bg);cursor:pointer;}
.opt:hover{border-color:var(--accent-2);}
.opt.on{border-color:var(--accent);background:var(--accent-bg);}
.opt.ok{border-color:#bfe0c8;background:var(--ok-bg);cursor:default;}
.opt.no{border-color:#e7cfc9;background:var(--no-bg);cursor:default;}
.opt.ok:hover,.opt.no:hover{border-color:inherit;}
.opt .lk{font-weight:700;color:var(--accent);min-width:20px;text-align:center;font-family:Georgia,serif;}
.opt .lt{color:var(--ink-soft);}
.fb{margin-top:16px;padding:12px 14px;font-size:14px;letter-spacing:.5px;}
.fb.ok{background:var(--ok-bg);color:var(--ok);border:1px solid #cfe3d4;}
.fb.no{background:var(--no-bg);color:var(--no);border:1px solid #e7cfc9;}
.exp{margin-top:10px;padding:12px 14px;background:var(--accent-bg);border:1px solid var(--line);
  border-left:3px solid var(--accent-2);font-size:13.5px;line-height:1.7;color:var(--ink-soft);}
.exp .exp-h{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent-2);margin-bottom:5px;font-weight:600;}
/* 主观题阅读卡（例题+参考答案，不计分） */
.read-card{border-left:3px solid #b08d57 !important;}
.ans{margin-top:14px;padding:14px 16px;background:#fbf7ef;border:1px solid #ecdfc6;border-radius:8px;}
.ans-h{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#a07a3c;margin-bottom:6px;font-weight:600;}
.ans-b{font-size:14px;line-height:1.8;color:var(--ink);white-space:normal;}
.btn.ghost.fav{background:var(--ok-bg);color:var(--ok);border-color:#cfe3d4;}
.sum{background:var(--paper);border:1px solid var(--line);padding:26px;}
.sum .big{font-size:34px;font-weight:700;font-family:Georgia,serif;color:var(--accent);}
.sum .row{display:flex;gap:24px;flex-wrap:wrap;margin:14px 0 6px;color:var(--ink-soft);}
.sum .row b{color:var(--ink);}
.empty{color:var(--muted);padding:30px 0;text-align:center;}
.foot{border-top:1px solid var(--line);background:var(--paper);color:var(--muted);font-size:12.5px;letter-spacing:.5px;}
.foot .shell{padding:22px 24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
@media(max-width:560px){.wrap{padding:22px 16px 50px;}.q{padding:18px 16px;}}
.footnav{display:flex;flex-wrap:wrap;gap:10px 20px;margin:0 0 10px;}
.footnav a{color:#2b6cb0;text-decoration:none;font-size:13.5px;font-weight:500;}
.footnav a:hover{text-decoration:underline;}
.foot .shell{flex-direction:column;align-items:flex-start;}
.foot-tip{font-size:12px;color:#9aa7b0;}
.info-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:0 0 22px;}
.infobox{background:var(--paper);border:1px solid var(--line);padding:14px 16px;}
.infobox.intro{border-left:3px solid var(--accent);}
.infobox.benefit{border-left:3px solid #3f7d4f;}
.infobox .ib-h{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--accent-2);margin-bottom:6px;}
.infobox.benefit .ib-h{color:var(--ok);}
.infobox .ib-b{font-size:13.5px;color:var(--ink-soft);line-height:1.7;}
.subs{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:8px;}
.subcard{background:var(--paper);border:1px solid var(--line);padding:16px 18px;}
.subcard .sub-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.subcard .sub-meta{font-size:13px;color:var(--muted);margin-bottom:12px;}
.subcard .acts{display:flex;gap:10px;flex-wrap:wrap;}
@media(max-width:560px){.info-wrap{grid-template-columns:1fr;}}
</style>
</head>
