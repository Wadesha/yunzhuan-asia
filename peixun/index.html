<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>培训刷题 · 总览</title>
<style>
:root{
  --ink:#1c1c1e; --ink-soft:#3a3a3e; --muted:#76767c;
  --line:#d9d9d4; --paper:#ffffff; --bg:#f3f2ee;
  --accent:#2f4858; --accent-2:#5b7384; --accent-bg:#eef1f3;
  --max:980px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.shell{max-width:var(--max);margin:0 auto;padding:0 24px;}
.site-head{background:var(--paper);border-bottom:1px solid var(--line);}
.site-head .shell{display:flex;align-items:baseline;justify-content:space-between;padding:22px 24px;flex-wrap:wrap;gap:8px;}
.brand{display:flex;align-items:center;gap:14px;}
.brand .mark{font-family:Georgia,"Times New Roman",serif;font-weight:700;font-size:20px;letter-spacing:2px;
  color:var(--paper);background:var(--accent);border:1px solid var(--accent);padding:6px 10px;line-height:1;}
.brand .names{line-height:1.25;}
.brand .zh{font-size:18px;font-weight:700;letter-spacing:1px;}
.brand .en{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.site-head .tagline{font-size:13px;color:var(--muted);letter-spacing:1px;}
.wrap{max-width:var(--max);margin:0 auto;padding:30px 24px 60px;}
.page-title{font-size:26px;letter-spacing:1px;margin:0 0 4px;font-family:Georgia,"Noto Serif SC",serif;}
.page-sub{color:var(--muted);font-size:14px;margin:0 0 26px;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.card{display:block;background:var(--paper);border:1px solid var(--line);padding:22px 22px;transition:border-color .15s,transform .15s;}
.card:hover{border-color:var(--accent);transform:translateY(-2px);}
.card .ct{font-size:18px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
.card .ce{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;}
.card .cd{font-size:13.5px;color:var(--ink-soft);min-height:42px;}
.card .cm{margin-top:14px;font-size:13px;color:var(--accent);letter-spacing:.5px;}
.card .cm b{font-size:15px;}
.foot{border-top:1px solid var(--line);background:var(--paper);color:var(--muted);font-size:12.5px;letter-spacing:.5px;}
.foot .shell{padding:22px 24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
@media(max-width:560px){.wrap{padding:22px 16px 50px;}}
</style>
</head>
<body>
<header class="site-head"><div class="shell">
  <div class="brand"><div class="mark">培</div><div class="names">
    <div class="zh">培训 · 刷题</div><div class="en">Training · 题库自测</div></div></div>
  <div class="tagline">学习中心 · 选择模块开始自测</div>
</div></header>
<main class="wrap">
  <h1 class="page-title">培训刷题 · 总览</h1>
  <p class="page-sub">点击下方模块进入对应题库，点击选项即可自动判分，答对浅绿、答错浅红。</p>
  <div class="cards">
    <a class="card" href="jianhu/"><div class="ct">监护培训考核</div><div class="ce">Guardian Training</div><div class="cd">第三方施工旁站监护 · 题库自测</div><div class="cm"><b>24</b> 题 · 单选 8、多选 6、判断 10</div></a>
    <a class="card" href="wuxiandian/"><div class="ct">业余无线电台操作技术能力验证</div><div class="ce">Amateur Radio</div><div class="cd">业余无线电台操作技术能力验证题库（2025年版）</div><div class="cm"><b>683</b> 题 · 单选 547、多选 136</div></a>
  </div>
</main>
<footer class="foot"><div class="shell">
  <span>培训刷题体系 · 题目来源见各子模块</span>
  <span>本地自测 · 进度自动保存</span>
</div></footer>
</body>
</html>
