<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>监护培训考核 · 刷题</title>
<style>
:root{
  --ink:#1c1c1e; --ink-soft:#3a3a3e; --muted:#76767c;
  --line:#d9d9d4; --paper:#ffffff; --bg:#f3f2ee;
  --accent:#2f4858; --accent-2:#5b7384; --accent-bg:#eef1f3;
  --ok:#3f7d4f; --ok-bg:#eaf3ec; --no:#a23b2e; --no-bg:#f6ece9;
  --max:980px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.shell{max-width:var(--max);margin:0 auto;padding:0 24px;}
.site-head{background:var(--paper);border-bottom:1px solid var(--line);}
.site-head .shell{display:flex;align-items:baseline;justify-content:space-between;padding:22px 24px;flex-wrap:wrap;gap:8px;}
.brand{display:flex;align-items:center;gap:14px;}
.brand .mark{font-family:Georgia,"Times New Roman",serif;font-weight:700;font-size:20px;letter-spacing:2px;
  color:var(--paper);background:var(--accent);border:1px solid var(--accent);padding:6px 10px;line-height:1;}
.brand .names{line-height:1.25;}
.brand .zh{font-size:18px;font-weight:700;letter-spacing:1px;}
.brand .en{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.site-head .tagline{font-size:13px;color:var(--muted);letter-spacing:1px;}
.wrap{max-width:var(--max);margin:0 auto;padding:30px 24px 60px;}
.page-title{font-size:26px;letter-spacing:1px;margin:0 0 4px;font-family:Georgia,"Noto Serif SC",serif;}
.page-sub{color:var(--muted);font-size:14px;margin:0 0 26px;}
.section-h{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--accent-2);
  margin:30px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line-soft);}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{font-size:13.5px;padding:7px 16px;border:1px solid var(--line);background:var(--paper);
  color:var(--ink-soft);cursor:pointer;letter-spacing:.5px;}
.chip:hover{border-color:var(--accent-2);color:var(--accent);}
.chip.on{background:var(--accent);border-color:var(--accent);color:var(--paper);}
.acts{margin-top:26px;display:flex;gap:12px;flex-wrap:wrap;}
.btn{display:inline-block;font-size:14px;letter-spacing:.5px;padding:10px 22px;border:1px solid var(--accent);
  color:var(--accent);background:var(--paper);cursor:pointer;font-family:inherit;}
.btn:hover{background:var(--accent);color:var(--paper);}
.btn.primary{background:var(--accent);color:var(--paper);}
.btn.primary:hover{background:var(--accent-2);border-color:var(--accent-2);}
.btn.ghost{border-color:var(--line);color:var(--muted);}
.btn.ghost:hover{background:var(--muted);color:var(--paper);border-color:var(--muted);}
.bar{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.bar .meta{font-size:13px;color:var(--muted);letter-spacing:1px;}
.bar .score{font-size:13px;color:var(--accent);letter-spacing:.5px;}
.prog{height:4px;background:var(--line);margin-bottom:22px;}
.prog .fill{height:100%;background:var(--accent);transition:width .2s;}
.q{background:var(--paper);border:1px solid var(--line);padding:24px 26px;}
.qt{font-size:17px;font-weight:600;line-height:1.6;margin-bottom:18px;}
.hint{font-size:12px;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);
  background:var(--bg);cursor:pointer;}
.opt:hover{border-color:var(--accent-2);}
.opt.on{border-color:var(--accent);background:var(--accent-bg);}
.opt .lk{font-weight:700;color:var(--accent);min-width:20px;text-align:center;font-family:Georgia,serif;}
.opt .lt{color:var(--ink-soft);}
.fb{margin-top:16px;padding:12px 14px;font-size:14px;letter-spacing:.5px;}
.fb.ok{background:var(--ok-bg);color:var(--ok);border:1px solid #cfe3d4;}
.fb.no{background:var(--no-bg);color:var(--no);border:1px solid #e7cfc9;}
.sum{background:var(--paper);border:1px solid var(--line);padding:26px;}
.sum .big{font-size:34px;font-weight:700;font-family:Georgia,serif;color:var(--accent);}
.sum .row{display:flex;gap:24px;flex-wrap:wrap;margin:14px 0 6px;color:var(--ink-soft);}
.sum .row b{color:var(--ink);}
.wrong-list{margin-top:18px;}
.wrong-item{border-top:1px dashed var(--line);padding:12px 0;}
.wrong-item .wq{font-weight:600;}
.wrong-item .wa{color:var(--no);font-size:13px;margin-top:4px;}
.empty{color:var(--muted);padding:30px 0;text-align:center;}
.foot{border-top:1px solid var(--line);background:var(--paper);color:var(--muted);font-size:12.5px;letter-spacing:.5px;}
.foot .shell{padding:22px 24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
@media(max-width:560px){.wrap{padding:22px 16px 50px;}.q{padding:18px 16px;}}
</style>
</head>

"只联系巡线员，无需录像。", "立即录下现场视频，并联系巡线员和安全员，报警处理。"], "answer": ["A", "B", "C"]}, {"type": "multi", "q": "物理隔离主要采取等方式，并缠绕警示带，同时在边缘设置警示旗或警示牌，提高辨识度。", "options": ["安插竹竿", "放置水马", "放置围栏", "加装钢制立柱"], "answer": ["B", "C", "D"]}, {"type": "multi", "q": "监护人员应每日在三个时段，分别在施工现场使用视频记录仪记录告知施工方注意事项、获取施工计划的过程。", "options": ["上午", "下午", "夜间加班", "施工结束后"], "answer": ["A", "B", "C"]}, {"type": "bool", "q": "施工过程中出现低压燃气管道遭到破环，可以依次顺时针关闭调压器的进、出口阀门，以切断气源。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "施工单位可根据需要选择人工开挖探坑；当施工范围较大、需开挖多个探坑时，为提高效率可采用机械开挖。", "options": ["正确", "错误"], "answer": "错误"}, {"type": "bool", "q": "在现场技术交底确认管线位置后，设置警示标识，并喷涂喷漆。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "次高压燃气管线及设施保护范围为1.5米，控制范围为1.5米到15米。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "警示旗应设置在管道位置上方的沟槽旁、围挡上等处，不得在不涉及管道的路灯杆、电线杆等处随意设置警示旗。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "与施工方对接后，记录施工现场保护措施、警示标识布置情况，记录时间不得少于5分钟。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "监护人员与巡检员、巡查员对接时，应通过视频记录仪记录巡检员的工作安排，记录时间不得少于3分钟。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "地下燃气管道与给水管之间垂直净距可以为10cm。", "options": ["正确", "错误"], "answer": "错误"}, {"type": "bool", "q": "监护人员通过视频记录仪进行记录时，可通过口头说明或拍摄监护记录本等方式说明当前录制内容，方便进行存档", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "监护人员到达施工现场后，与现场施工负责人、机械操作手等对接，告知对方，监护人员不在现场，燃气管道及设施控制范围内严禁施工，燃气警示标识2米范围内严禁机械开挖等过程，记录时间不得少于3分钟。", "options": ["正确", "错误"], "answer": "错误"}];</script>
<script>
(function(){
  "use strict";
  QBANK.forEach(function(q,i){ q.id = q.type + "-" + i; });
  var TYPE_ZH = { single:"单项选择题", multi:"多项选择题", bool:"判断题" };
  var WRONG_KEY = "peixun_wrong_v1";

  function loadWrong(){ try { return JSON.parse(localStorage.getItem(WRONG_KEY)||"[]"); } catch(e){ return []; } }
  function saveWrong(a){ try { localStorage.setItem(WRONG_KEY, JSON.stringify(a)); } catch(e){} }
  function markWrong(id){ var w=loadWrong(); if(w.indexOf(id)<0){ w.push(id); saveWrong(w); } }
  function clearWrong(id){ var w=loadWrong(); var i=w.indexOf(id); if(i>=0){ w.splice(i,1); saveWrong(w); } }

  var state = { phase:"start", list:[], idx:0, sel:{}, submitted:{}, correct:0, wrong:0,
                filter:"all", shuffle:false, wrongSet:[] };

  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function letterOf(i){ return String.fromCharCode(65+i); }

  // 选中值（用于判分）：单选/多选 -> 字母；判断 -> 文字
  function selectedValue(q, sel){
    if(sel==null) return null;
    if(q.type==="bool") return sel===0?"正确":(sel===1?"错误":null);
    if(q.type==="multi") return sel.map(function(i){ return letterOf(i); });
    return letterOf(sel);
  }
  function grade(q, sel){
    var v = selectedValue(q, sel);
    if(q.type==="multi"){
      if(!v || v.length!==q.answer.length) return false;
      var a=v.slice().sort(), b=q.answer.slice().sort();
      for(var i=0;i<a.length;i++){ if(a[i]!==b[i]) return false; }
      return true;
    }
    return v === q.answer;
  }
  function answerText(q){
    if(q.type==="multi") return q.answer.join("、");
    return q.answer;
  }

  function buildList(fromWrong){
    var base;
    if(fromWrong){
      var ws = loadWrong();
      base = QBANK.filter(function(q){ return ws.indexOf(q.id)>=0; });
    } else {
      base = QBANK.slice();
      if(state.filter!=="all") base = base.filter(function(q){ return q.type===state.filter; });
    }
    if(state.shuffle){ for(var i=base.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=base[i]; base[i]=base[j]; base[j]=t; } }
    state.list = base; state.idx=0; state.sel={}; state.submitted={}; state.correct=0; state.wrong=0;
  }

  function optHtml(q){
    var cur = state.sel[q.id];
    var answered = state.submitted[q.id];
    return q.options.map(function(o,oi){
      var on;
      if(q.type==="multi") on = (cur&&cur.indexOf(oi)>=0);
      else on = (cur===oi);
      var lab = (q.type==="bool") ? o : letterOf(oi);
      return '<div class="opt'+(on?" on":"")+'" data-opt="'+oi+'">'+
             '<span class="lk">'+lab+'</span><span class="lt">'+esc(o)+'</span></div>';
    }).join("");
  }

  function renderStart(){
    var wn = loadWrong().length;
    var chip = function(v,label){ return '<span class="chip'+(state.filter===v?" on":"")+'" data-act="filter" data-v="'+v+'">'+label+'</span>'; };
    var app = document.getElementById("app");
    app.innerHTML =
      '<h1 class="page-title">监护培训考核 · 刷题</h1>'+
      '<p class="page-sub">题目来源：监护培训考核题库（单选/多选/判断 共 '+QBANK.length+' 题）</p>'+
      '<div class="section-h">题型</div><div class="chips">'+
        chip("all","全部")+chip("single","单选")+chip("multi","多选")+chip("bool","判断")+'</div>'+
      '<div class="section-h">模式</div><div class="chips">'+
        '<span class="chip'+(state.shuffle?" on":"")+'" data-act="toggle-shuffle">乱序：'+(state.shuffle?"开":"关")+'</span></div>'+
      '<div class="acts">'+
        '<button class="btn primary" data-act="start">开始刷题</button>'+
        (wn? '<button class="btn ghost" data-act="wrong">重练错题（'+wn+'）</button>':'')+
      '</div>';
  }

  function renderQuiz(){
    var app = document.getElementById("app");
    if(!state.list.length){ app.innerHTML='<div class="empty">该题型暂无题目。</div>'; return; }
    var q = state.list[state.idx];
    var total = state.list.length;
    var answered = state.submitted[q.id];
    var fb = "";
    if(answered){
      var isCor = grade(q, state.sel[q.id]);
      fb = '<div class="fb '+(isCor?"ok":"no")+'">'+(isCor?"回答正确":"回答错误")+
           ' · 正确答案：'+esc(answerText(q))+'</div>';
    }
    app.innerHTML =
      '<div class="bar"><div class="meta">第 '+(state.idx+1)+' / '+total+' 题 · '+TYPE_ZH[q.type]+'</div>'+
        '<div class="score">答对 '+state.correct+' · 答错 '+state.wrong+'</div></div>'+
      '<div class="prog"><div class="fill" style="width:'+(100*state.idx/total)+'%"></div></div>'+
      '<div class="q"><div class="qt">'+esc(q.q)+'</div>'+
        '<div class="opts">'+(q.type==="multi"?'<div class="hint">本题为多选，可勾选多个选项</div>':'')+optHtml(q)+'</div>'+
        (answered?fb:'')+
        '<div class="acts">'+(answered
          ? '<button class="btn primary" data-act="next">下一题</button>'
          : '<button class="btn primary" data-act="submit">提交答案</button>')+'</div>'+
      '</div>';
  }

  function renderSummary(){
    var app = document.getElementById("app");
    var total = state.list.length;
    var acc = total? Math.round(100*state.correct/total):0;
    var wrongItems = state.list.filter(function(q){ return !grade(q, state.sel[q.id]); })
      .map(function(q){
        return '<div class="wrong-item"><div class="wq">'+esc(q.q)+'</div>'+
               '<div class="wa">正确答案：'+esc(answerText(q))+'</div></div>';
      }).join("");
    app.innerHTML =
      '<div class="sum"><div class="big">'+acc+'%</div>'+
        '<div class="row"><span>共 <b>'+total+'</b> 题</span><span>答对 <b>'+state.correct+'</b></span>'+
          '<span>答错 <b>'+state.wrong+'</b></span></div>'+
        (wrongItems?'<div class="wrong-list"><div class="section-h">错题回顾</div>'+wrongItems+'</div>':'<p class="page-sub">全部答对，干得漂亮。</p>')+
        '<div class="acts">'+
          '<button class="btn primary" data-act="again">再来一次</button>'+
          '<button class="btn ghost" data-act="home">返回首页</button>'+
        '</div></div>';
  }

  function render(){
    if(state.phase==="start"){ renderStart(); return; }
    if(state.phase==="summary"){ renderSummary(); return; }
    renderQuiz();
  }

  function onClick(e){
    var t = e.target.closest ? e.target.closest("[data-act],[data-opt]") : null;
    if(!t) return;
    e.preventDefault();
    try {
      if(t.getAttribute("data-opt")!=null){
        var q = state.list[state.idx];
        if(state.submitted[q.id]) return;
        var oi = parseInt(t.getAttribute("data-opt"),10);
        if(q.type==="multi"){
          var arr = state.sel[q.id] || [];
          var k = arr.indexOf(oi);
          if(k>=0) arr.splice(k,1); else arr.push(oi);
          state.sel[q.id] = arr;
        } else {
          state.sel[q.id] = oi;
        }
        render();
        return;
      }
      var act = t.getAttribute("data-act");
      if(act==="filter"){ state.filter = t.getAttribute("data-v"); render(); }
      else if(act==="toggle-shuffle"){ state.shuffle=!state.shuffle; render(); }
      else if(act==="start"){ state.phase="quiz"; buildList(false); render(); }
      else if(act==="wrong"){
        var wn = loadWrong().length;
        if(!wn){ return; }
        state.phase="quiz"; buildList(true); render();
      }
      else if(act==="submit"){
        var q2 = state.list[state.idx];
        if(state.submitted[q2.id]) return;
        state.submitted[q2.id] = true;
        if(grade(q2, state.sel[q2.id])){ state.correct++; }
        else { state.wrong++; markWrong(q2.id); }
        render();
      }
      else if(act==="next"){
        state.idx++;
        if(state.idx >= state.list.length){ state.phase="summary"; }
        render();
      }
      else if(act==="again"){ state.phase="quiz"; buildList(false); render(); }
      else if(act==="home"){ state.phase="start"; render(); }
    } catch(err){
      document.getElementById("app").innerHTML = '<div class="empty">交互出错：'+esc(String(err&&err.message||err))+'</div>';
    }
  }
  document.addEventListener("click", onClick);
  render();
})();
</script>
</body>
</html>
