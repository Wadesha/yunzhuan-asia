<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>做题历史 · 培学自测</title>
<style>
  :root { --accent:#2f4858; --line:#e3e8ec; --bg:#f5f7f9; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.6 -apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:#233; }
  .site-head { background:var(--accent); color:#fff; }
  .site-head .shell { max-width:920px; margin:0 auto; padding:12px 16px; display:flex; align-items:center; gap:12px; }
  .brand { width:34px; height:34px; border-radius:8px; background:rgba(255,255,255,.16);
           display:flex; align-items:center; justify-content:center; font-weight:700; }
  .tagline { font-weight:600; }
  .back-link { margin-left:auto; color:#fff; text-decoration:none; font-size:14px;
               border:1px solid rgba(255,255,255,.4); padding:5px 12px; border-radius:8px; }
  .back-link:hover { background:rgba(255,255,255,.12); }
  .wrap { max-width:920px; margin:0 auto; padding:18px 16px 48px; }
  .account-line { font-size:13px; padding:8px 12px; border-radius:8px; margin-bottom:18px; }
  .account-line.on { background:#e7f0ec; color:#1d6b46; }
  .account-line.off { background:#fdf3e7; color:#8a5a16; }
  .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  .card h2 { margin:0 0 12px; font-size:16px; display:flex; align-items:center; gap:8px; }
  .card h2 .tag { font-size:12px; font-weight:500; color:#7a8a94; background:#eef2f5; padding:2px 8px; border-radius:20px; }
  .grid { display:flex; flex-wrap:wrap; gap:10px; }
  .stat { flex:1 1 120px; background:#f7f9fb; border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .stat b { display:block; font-size:20px; color:var(--accent); }
  .stat span { font-size:12px; color:#7a8a94; }
  .timeline { list-style:none; margin:0; padding:0; }
  .tl-item { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px;
             display:flex; gap:14px; align-items:center; }
  .tl-date { flex:0 0 96px; color:#7a8a94; font-size:13px; line-height:1.4; }
  .tl-main { flex:1 1 auto; min-width:0; }
  .tl-top { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .tl-mod { font-weight:600; }
  .tl-detail { color:#566; font-size:13px; }
  .tl-score { display:flex; align-items:center; gap:10px; margin-top:6px; }
  .bar { height:6px; border-radius:4px; background:#e9eef2; overflow:hidden; width:120px; }
  .bar > i { display:block; height:100%; background:#2f8f5b; }
  .tl-pct { font-weight:600; color:var(--accent); }
  .tl-go { flex:0 0 auto; color:var(--accent); text-decoration:none; font-size:14px; white-space:nowrap; }
  .tl-go:hover { text-decoration:underline; }
  .muted { color:#9aa7b0; font-size:13px; }
  .empty-note { text-align:center; color:#9aa7b0; padding:40px 0; }
  .wrong-line { font-size:14px; color:#566; }
  .wrong-line a { color:var(--accent); text-decoration:none; }
  .wrong-line a:hover { text-decoration:underline; }
  .footnav{display:flex;flex-wrap:wrap;gap:10px 20px;margin:0 0 10px;}
  .footnav a{color:#2b6cb0;text-decoration:none;font-size:13.5px;font-weight:500;}
  .footnav a:hover{text-decoration:underline;}
  .foot .shell{flex-direction:column;align-items:flex-start;}
  .foot-tip{font-size:12px;color:#9aa7b0;}
</style>
</head>
<body>
<header class="site-head"><div class="shell">
  <div class="brand">培</div>
  <div class="tagline">做题历史</div>
  <a class="back-link" href="index.html">← 返回题库</a>
</div></header>

<main class="wrap">
  <div id="account-line" class="account-line">读取中…</div>

  <section id="overview" class="card" hidden>
    <h2>总览</h2>
    <div class="grid" id="overview-grid"></div>
  </section>

  <section id="timeline-card" class="card" hidden>
    <h2>做题记录 <span class="tag" id="tl-count"></span></h2>
    <ul class="timeline" id="timeline"></ul>
  </section>

  <section id="wrongs" class="card" hidden>
    <h2>错题本 · 待巩固</h2>
    <div id="wrongs-body" class="wrong-line"></div>
  </section>

  <p class="empty-note" id="empty-note" hidden>还没有做题记录。去刷几道题，记录就会按时间显示在这里。</p>
</main>

<!-- supabase-js（登录态恢复需要） -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="store.js"></script>
<script src="catalog.js"></script>
<script src="store.supabase.js"></script>
<script src="auth.js"></script>
<script>
  // 恢复登录态（会把云端数据 hydrate 进 Store 缓存）；离线/CDN 失败也不影响本机记录
  try { if (window.PeixunAuth && window.SupabaseBackend) PeixunAuth.init(); } catch (e) {}

  function safeLS(k) { try { return JSON.parse(localStorage.getItem(k) || "null"); } catch (e) { return null; } }
  function Sget(k) { return (window.Store && window.Store.get) ? window.Store.get(k) : safeLS(k); }
  function maskPhone(p) { if (!p || p.length < 7) return p; return p.slice(0, 3) + "****" + p.slice(7); }
  function typeZh(t) { return t === "single" ? "单选" : t === "multi" ? "多选" : t === "bool" ? "判断" : ""; }
  function fmtDate(ts) {
    var d = new Date(ts), p = function (n) { return (n < 10 ? "0" : "") + n; };
    return (d.getMonth() + 1) + "-" + p(d.getDate()) + " " + p(d.getHours()) + ":" + p(d.getMinutes());
  }
  function examName(catId, examId) {
    if (!window.EXAMS) return catId + " / " + examId;
    for (var i = 0; i < window.EXAMS.length; i++) {
      var c = window.EXAMS[i];
      if (c.id !== catId) continue;
      var es = c.exams || [];
      for (var j = 0; j < es.length; j++) if (es[j].id === examId) return c.name + " · " + es[j].name;
      return c.name;
    }
    return catId + " / " + examId;
  }

  function render() {
    // ---- 账号行 ----
    var id = safeLS("peixun_cloud_identity_v1");
    var acct = document.getElementById("account-line");
    if (id && id.phone) {
      acct.className = "account-line on";
      acct.textContent = "已登录（" + maskPhone(id.phone) + "）·云端同步中";
    } else {
      acct.className = "account-line off";
      acct.textContent = "未登录 · 当前显示本机做题记录（不会同步到云端）";
    }

    // ---- 聚合三模块累计做题历史 ----
    var jAtt = Sget("peixun_jianhu_attempts_v1") || [];
    var wAtt = Sget("peixun_wuxiandian_attempts_v1") || [];
    var sAtt = Sget("peixun_spa_attempts_v1") || [];
    var jw = Sget("peixun_jianhu_wrong_v1") || [];
    var ww = Sget("peixun_wuxiandian_wrong_v1") || [];

    var items = [];
    jAtt.forEach(function (a) {
      items.push({ ts: a.ts, mod: "监护培训考核", link: "jianhu/index.html",
        detail: (a.mode || "") + (a.filter && a.filter !== "all" ? " · " + typeZh(a.filter) : ""),
        correct: a.correct, wrong: a.wrong, total: a.total, acc: a.acc });
    });
    wAtt.forEach(function (a) {
      items.push({ ts: a.ts, mod: "业余无线电", link: "wuxiandian/index.html",
        detail: (a.mode || "") + (a.filter && a.filter !== "all" ? " · " + typeZh(a.filter) : ""),
        correct: a.correct, wrong: a.wrong, total: a.total, acc: a.acc });
    });
    sAtt.forEach(function (a) {
      items.push({ ts: a.ts, mod: "资格考试题库", link: "index.html#/exam/" + a.catId + "/" + a.examId,
        detail: examName(a.catId, a.examId),
        correct: a.correct, wrong: a.wrong, total: a.total, acc: a.acc });
    });
    items.sort(function (x, y) { return y.ts - x.ts; });

    var anyData = items.length > 0 || jw.length > 0 || ww.length > 0;
    if (!anyData) {
      document.getElementById("overview").hidden = true;
      document.getElementById("timeline-card").hidden = true;
      document.getElementById("wrongs").hidden = true;
      document.getElementById("empty-note").hidden = false;
      return;
    }
    document.getElementById("empty-note").hidden = true;

    // ---- 总览 ----
    var qTotal = 0, qCor = 0;
    items.forEach(function (it) { qTotal += it.total; qCor += it.correct; });
    var ov = document.getElementById("overview-grid");
    ov.innerHTML =
      '<div class="stat"><b>' + items.length + '</b><span>做题次数</span></div>' +
      '<div class="stat"><b>' + qTotal + '</b><span>累计答题</span></div>' +
      '<div class="stat"><b>' + (qTotal ? Math.round(qCor / qTotal * 100) : 0) + '%</b><span>总正确率</span></div>' +
      '<div class="stat"><b>' + (jw.length + ww.length) + '</b><span>待巩固错题</span></div>';
    document.getElementById("overview").hidden = false;

    // ---- 时间线 ----
    document.getElementById("tl-count").textContent = items.length + " 次";
    document.getElementById("timeline").innerHTML = items.map(function (it) {
      var det = it.detail ? '<span class="tl-detail">' + it.detail + '</span>' : '';
      return '<li class="tl-item">' +
        '<div class="tl-date">' + fmtDate(it.ts) + '</div>' +
        '<div class="tl-main"><div class="tl-top"><span class="tl-mod">' + it.mod + '</span>' + det + '</div>' +
          '<div class="tl-score"><span class="tl-pct">' + it.acc + '%</span>' +
          '<div class="bar"><i style="width:' + it.acc + '%"></i></div>' +
          '<span class="muted">答对 ' + it.correct + ' / ' + it.total + '</span></div></div>' +
        '<a class="tl-go" href="' + it.link + '">去刷题 →</a>' +
        '</li>';
    }).join("");
    document.getElementById("timeline-card").hidden = false;

    // ---- 错题本 ----
    var wb = document.getElementById("wrongs-body");
    var parts = [];
    if (jw.length) parts.push('监护错题 <b>' + jw.length + '</b> 道 · <a href="jianhu/index.html">去巩固</a>');
    if (ww.length) parts.push('业余无线电错题 <b>' + ww.length + '</b> 道 · <a href="wuxiandian/index.html">去巩固</a>');
    if (parts.length) { wb.innerHTML = parts.join('　|　'); document.getElementById("wrongs").hidden = false; }
    else document.getElementById("wrongs").hidden = true;
  }

  render();
  // 登录是异步的：云端账号先把数据 hydrate 进缓存，重渲染钩子 + 兜底 setTimeout 各触发一次以拿到最新数据
  window.__peixunReRender = render;
  setTimeout(render, 600);
</script>
<footer class="foot"><div class="shell">
  <nav class="footnav">
    <a href="index.html">刷题总目录</a>
    <a href="jianhu/index.html">监护培训考核</a>
    <a href="wuxiandian/index.html">业余无线电</a>
    <a href="../">云篆官网</a>
  </nav>
  <span class="foot-tip">做题历史 · 聚合三模块进度与错题</span>
</div></footer>
</body>
</html>
