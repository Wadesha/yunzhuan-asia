<style>
:root{
  --ink:#1c1c1e; --ink-soft:#3a3a3e; --muted:#76767c;

  --max:980px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.shell{max-width:var(--max);margin:0 auto;padding:0 24px;}
.site-head{background:var(--paper);border-bottom:1px solid var(--line);}
.site-head .shell{display:flex;align-items:baseline;justify-content:space-between;padding:22px 24px;flex-wrap:wrap;gap:8px;}
.brand{display:flex;align-items:center;gap:14px;}
.brand .mark{font-family:Georgia,"Times New Roman",serif;font-weight:700;font-size:20px;letter-spacing:2px;
  color:var(--paper);background:var(--accent);border:1px solid var(--accent);padding:6px 10px;line-height:1;}
.brand .names{line-height:1.25;}
.brand .zh{font-size:18px;font-weight:700;letter-spacing:1px;}
.brand .en{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.site-head .tagline{font-size:13px;color:var(--muted);letter-spacing:1px;}
.wrap{max-width:var(--max);margin:0 auto;padding:30px 24px 60px;}
.page-title{font-size:26px;letter-spacing:1px;margin:0 0 4px;font-family:Georgia,"Noto Serif SC",serif;}
.page-sub{color:var(--muted);font-size:14px;margin:0 0 26px;}
.section-h{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--accent-2);
  margin:30px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line-soft);}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{font-size:13.5px;padding:7px 16px;border:1px solid var(--line);background:var(--paper);
  color:var(--ink-soft);cursor:pointer;letter-spacing:.5px;}
.chip:hover{border-color:var(--accent-2);color:var(--accent);}
.chip.on{background:var(--accent);border-color:var(--accent);color:var(--paper);}
.acts{margin-top:26px;display:flex;gap:12px;flex-wrap:wrap;}
.btn{display:inline-block;font-size:14px;letter-spacing:.5px;padding:10px 22px;border:1px solid var(--accent);
  color:var(--accent);background:var(--paper);cursor:pointer;font-family:inherit;}
.btn:hover{background:var(--accent);color:var(--paper);}
.btn.primary{background:var(--accent);color:var(--paper);}
.btn.primary:hover{background:var(--accent-2);border-color:var(--accent-2);}
.btn.ghost{border-color:var(--line);color:var(--muted);}
.btn.ghost:hover{background:var(--muted);color:var(--paper);border-color:var(--muted);}
.bar{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:8px;}

.bar .score{font-size:13px;color:var(--accent);letter-spacing:.5px;}
.prog{height:4px;background:var(--line);margin-bottom:22px;}
.prog .fill{height:100%;background:var(--accent);transition:width .2s;}
.q{background:var(--paper);border:1px solid var(--line);padding:24px 26px;}
.qt{font-size:17px;font-weight:600;line-height:1.6;margin-bottom:18px;}
.hint{font-size:12px;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;}
.modnav{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 20px;}
.modnav a{font-size:13.5px;color:var(--accent);border:1px solid var(--line);padding:7px 15px;letter-spacing:.5px;}
.modnav a:hover{background:var(--accent);color:var(--paper);border-color:var(--accent);}
.modnav .cur{font-size:13.5px;color:var(--muted);border:1px dashed var(--line);padding:7px 15px;}
.notebox{background:var(--accent-bg);border:1px solid var(--line);padding:12px 16px;font-size:13px;color:var(--ink-soft);margin:0 0 22px;line-height:1.75;}
.notebox b{color:var(--accent);font-weight:600;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);
  background:var(--bg);cursor:pointer;}
.opt:hover{border-color:var(--accent-2);}
.opt.on{border-color:var(--accent);background:var(--accent-bg);}
.opt.ok{border-color:#bfe0c8;background:var(--ok-bg);cursor:default;}
.opt.no{border-color:#e7cfc9;background:var(--no-bg);cursor:default;}
.opt.ok:hover,.opt.no:hover{border-color:inherit;}
.opt .lk{font-weight:700;color:var(--accent);min-width:20px;text-align:center;font-family:Georgia,serif;}
.opt .lt{color:var(--ink-soft);}
.fb{margin-top:16px;padding:12px 14px;font-size:14px;letter-spacing:.5px;}
.fb.ok{background:var(--ok-bg);color:var(--ok);border:1px solid #cfe3d4;}
.fb.no{background:var(--no-bg);color:var(--no);border:1px solid #e7cfc9;}
.sum{background:var(--paper);border:1px solid var(--line);padding:26px;}
.sum .big{font-size:34px;font-weight:700;font-family:Georgia,serif;color:var(--accent);}
.sum .row{display:flex;gap:24px;flex-wrap:wrap;margin:14px 0 6px;color:var(--ink-soft);}
.sum .row b{color:var(--ink);}
.wrong-list{margin-top:18px;}
.wrong-item{border-top:1px dashed var(--line);padding:12px 0;}
.wrong-item .wq{font-weight:600;}
.wrong-item .wa{color:var(--no);font-size:13px;margin-top:4px;}
.empty{color:var(--muted);padding:30px 0;text-align:center;}
.foot{border-top:1px solid var(--line);background:var(--paper);color:var(--muted);font-size:12.5px;letter-spacing:.5px;}
.foot .shell{padding:22px 24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
@media(max-width:560px){.wrap{padding:22px 16px 50px;}.q{padding:18px 16px;}}

.footnav a:hover{text-decoration:underline;}
.foot .shell{flex-direction:column;align-items:flex-start;}

"只联系巡线员，无需录像。", "立即录下现场视频，并联系巡线员和安全员，报警处理。"], "answer": ["A", "B", "C"]}, {"type": "multi", "q": "物理隔离主要采取等方式，并缠绕警示带，同时在边缘设置警示旗或警示牌，提高辨识度。", "options": ["安插竹竿", "放置水马", "放置围栏", "加装钢制立柱"], "answer": ["B", "C", "D"]}, {"type": "multi", "q": "监护人员应每日在三个时段，分别在施工现场使用视频记录仪记录告知施工方注意事项、获取施工计划的过程。", "options": ["上午", "下午", "夜间加班", "施工结束后"], "answer": ["A", "B", "C"]}, {"type": "bool", "q": "施工过程中出现低压燃气管道遭到破环，可以依次顺时针关闭调压器的进、出口阀门，以切断气源。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "施工单位可根据需要选择人工开挖探坑；当施工范围较大、需开挖多个探坑时，为提高效率可采用机械开挖。", "options": ["正确", "错误"], "answer": "错误"}, {"type": "bool", "q": "在现场技术交底确认管线位置后，设置警示标识，并喷涂喷漆。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "次高压燃气管线及设施保护范围为1.5米，控制范围为1.5米到15米。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "警示旗应设置在管道位置上方的沟槽旁、围挡上等处，不得在不涉及管道的路灯杆、电线杆等处随意设置警示旗。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "与施工方对接后，记录施工现场保护措施、警示标识布置情况，记录时间不得少于5分钟。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "监护人员与巡检员、巡查员对接时，应通过视频记录仪记录巡检员的工作安排，记录时间不得少于3分钟。", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "地下燃气管道与给水管之间垂直净距可以为10cm。", "options": ["正确", "错误"], "answer": "错误"}, {"type": "bool", "q": "监护人员通过视频记录仪进行记录时，可通过口头说明或拍摄监护记录本等方式说明当前录制内容，方便进行存档", "options": ["正确", "错误"], "answer": "正确"}, {"type": "bool", "q": "监护人员到达施工现场后，与现场施工负责人、机械操作手等对接，告知对方，监护人员不在现场，燃气管道及设施控制范围内严禁施工，燃气警示标识2米范围内严禁机械开挖等过程，记录时间不得少于3分钟。", "options": ["正确", "错误"], "answer": "错误"}];</script>

<script>
(function(){
  "use strict";
  QBANK.forEach(function(q,i){ q.id = q.type + "-" + i; });
  var TYPE_ZH = { single:"单项选择题", multi:"多项选择题", bool:"判断题" };
  var WRONG_KEY = "peixun_jianhu_wrong_v1";

  function Sget(k){ if(window.Store) return window.Store.get(k); try { return JSON.parse(localStorage.getItem(k) || "null"); } catch(e){ return null; } }
  function Sset(k,v){ if(window.Store) return window.Store.set(k,v); try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
  function Srem(k){ if(window.Store) return window.Store.remove(k); try { localStorage.removeItem(k); } catch(e){} }
  function loadWrong(){ var w = Sget(WRONG_KEY); return Array.isArray(w) ? w : []; }
  function saveWrong(a){ Sset(WRONG_KEY, a); }
  function markWrong(id){ var w=loadWrong(); if(w.indexOf(id)<0){ w.push(id); saveWrong(w); } }
  function clearWrong(id){ var w=loadWrong(); var i=w.indexOf(id); if(i>=0){ w.splice(i,1); saveWrong(w); } }

  var state = { phase:"start", list:[], idx:0, sel:{}, graded:{}, correct:0, wrong:0, reading:false,
                filter:"all", shuffle:false, autoRead:false, lastReadId:null };
  var AUTOREAD_KEY = "peixun_jianhu_autoread_v1";
  var PROGRESS_KEY = "peixun_jianhu_progress_v1";
  function loadAutoRead(){ try { return localStorage.getItem(AUTOREAD_KEY)==="1"; } catch(e){ return false; } }
  function saveAutoRead(){ try { localStorage.setItem(AUTOREAD_KEY, state.autoRead?"1":"0"); } catch(e){} }
  state.autoRead = loadAutoRead();

  // 进度持久化（断点续刷）
  function loadProgress(){
    try {
      var p = Sget(PROGRESS_KEY);
      if(!p || !p.qids || !p.qids.length) return null;
      return p;
    } catch(e){ return null; }
  }
  function saveProgress(){
    try {
      if(state.phase!=="quiz" || !state.list.length) return;
      Sset(PROGRESS_KEY, {
        qids: state.list.map(function(q){ return q.id; }),
        idx: state.idx, sel: state.sel, graded: state.graded,
        correct: state.correct, wrong: state.wrong,
        filter: state.filter, shuffle: state.shuffle, ts: Date.now()
      });
    } catch(e){}
  }
  function clearProgress(){ Srem(PROGRESS_KEY); }

  // 累计做题历史（完成即落盘，供首页"最近一次"与历史页时间线）
  var ATTEMPT_KEY = "peixun_jianhu_attempts_v1";
  function loadAttempts(){ var a = Sget(ATTEMPT_KEY); return Array.isArray(a) ? a : []; }
  function recordAttempt(){
    try {
      var total = state.list.length; if(!total) return;
      var acc = Math.round(100 * state.correct / total);
      var a = loadAttempts();
      a.unshift({ ts: Date.now(), mode: state.shuffle ? "乱序" : "顺序", filter: state.filter,
                  total: total, correct: state.correct, wrong: state.wrong, acc: acc });
      if(a.length > 50) a.length = 50;
      Sset(ATTEMPT_KEY, a);
    } catch(e){}
  }
  function fmtDate(ts){ var d = new Date(ts); function p(n){ return (n<10?"0":"")+n; } return (d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes()); }
  function recentHint(){
    var a = loadAttempts(); if(!a.length) return "";
    var r = a[0];
    return '<p class="hint">最近一次：'+fmtDate(r.ts)+' · 答对 '+r.correct+'/'+r.total+'（'+r.acc+'%）</p>';
  }

  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function letterOf(i){ return String.fromCharCode(65+i); }

  // 语音朗读（Web Speech API，纯前端，只读题干）
  var speechOK = !!(window.speechSynthesis) && (typeof SpeechSynthesisUtterance !== "undefined");
  var synth = speechOK ? window.speechSynthesis : null;
  var zhVoice = null, voiceReady = false, speechUnlocked = false, _speakToken = 0;
  function pickVoice(){
    if(!synth) return;
    var vs = synth.getVoices() || [];
    zhVoice = vs.filter(function(v){ return /zh|cmn|Chinese/i.test(v.lang + " " + v.name); })[0] || null;
    voiceReady = vs.length > 0;
  }
  function unlockSpeech(){ speechUnlocked = true; if(synth && !voiceReady) pickVoice(); }
  if(synth){
    pickVoice();
    if("onvoiceschanged" in synth) synth.onvoiceschanged = pickVoice;
    setTimeout(pickVoice, 250); // 部分浏览器首次异步加载嗓音
  }
  function stopRead(){ if(synth) synth.cancel(); }
  function readAloud(text){
    if(!synth) return;
    synth.cancel();
    var tok = ++_speakToken;
    var u = new SpeechSynthesisUtterance(String(text == null ? "" : text));
    u.lang = "zh-CN"; u.rate = 1; u.pitch = 1;
    if(zhVoice) u.voice = zhVoice;
    u.onend = function(){ if(tok!==_speakToken) return; state.reading = false; renderReadBtn(); };
    u.onerror = function(){ if(tok!==_speakToken) return; state.reading = false; renderReadBtn(); };
    synth.speak(u);
    // 移动端 Chromium 偶发不发声：稍后检测，未开始则重试一次
    setTimeout(function(){
      if(tok!==_speakToken) return;
      try { if(synth && !synth.speaking) synth.speak(u); } catch(e){}
    }, 300);
  }
  function renderReadBtn(){
    var el = document.querySelector("#app .btn.read");
    if(!el) return;
    var active = state.reading;
    el.className = "btn read" + (active ? " on" : "");
    el.textContent = active ? "停止朗读" : "朗读题干";
  }

  function selectedValue(q, sel){
    if(sel==null) return null;
    if(q.type==="bool") return sel===0?"正确":(sel===1?"错误":null);
    if(q.type==="multi") return sel.map(function(i){ return letterOf(i); });
    return letterOf(sel);
  }
  function grade(q, sel){
    var v = selectedValue(q, sel);
    if(q.type==="multi"){
      if(!v || v.length!==q.answer.length) return false;
      var a=v.slice().sort(), b=q.answer.slice().sort();
      for(var i=0;i<a.length;i++){ if(a[i]!==b[i]) return false; }
      return true;
    }
    return v === q.answer;
  }
  function answerText(q){
    if(q.type==="multi") return q.answer.join("、");
    return q.answer;
  }
  // 朗读正确选项的【具体内容文字】，而非字母标签（如 B）
  function correctText(q){
    if(q.type==="bool") return q.answer;
    if(q.type==="multi") return q.answer.map(function(L){ var i = (typeof L==="number")?L:(L.charCodeAt(0)-65); return q.options[i]; }).join("；");
    var i = (typeof q.answer==="number")?q.answer:(q.answer.charCodeAt(0)-65);
    return q.options[i];
  }
  // 判分后朗读正确答案（与自动朗读题干相互独立；朗读的是选项内容）
  function readAnswer(q){
    if(!synth) return;
    var isCor = grade(q, state.sel[q.id]);
    readAloud((isCor ? "回答正确。" : "回答错误。") + "正确答案：" + correctText(q));
  }

  function doGrade(q){
    var qid = q.id;
    if(state.graded[qid]) return;
    state.graded[qid] = true;
    if(grade(q, state.sel[qid])) state.correct++; else { state.wrong++; markWrong(qid); }
  }

  function buildList(fromWrong){
    var base;
    if(fromWrong){
      var ws = loadWrong();
      base = QBANK.filter(function(q){ return ws.indexOf(q.id)>=0; });
    } else {
      base = QBANK.slice();
      if(state.filter!=="all") base = base.filter(function(q){ return q.type===state.filter; });
    }
    if(state.shuffle){ for(var i=base.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=base[i]; base[i]=base[j]; base[j]=t; } }
    state.list = base; state.idx=0; state.sel={}; state.graded={}; state.correct=0; state.wrong=0; state.lastReadId=null;
  }

  // 正确选项对应的下标集合
  function correctIdx(q){
    if(q.type==="bool") return [ (q.answer==="正确"?0:1) ];
    if(q.type==="multi") return q.answer.map(function(L){ return L.charCodeAt(0)-65; });
    return [ q.answer.charCodeAt(0)-65 ];
  }

  function optHtml(q){
    var cur = state.sel[q.id];
    var graded = state.graded[q.id];
    var isMulti = q.type==="multi";
    var corr = correctIdx(q);
    return q.options.map(function(o,oi){
      var lab = (q.type==="bool") ? o : letterOf(oi);
      var selected = isMulti ? (cur && cur.indexOf(oi)>=0) : (cur===oi);
      var cls = "opt";
      if(graded){
        if(corr.indexOf(oi)>=0) cls += " ok";
        else if(selected) cls += " no";
      } else if(selected){
        cls += " on";
      }
      return '<div class="'+cls+'" data-opt="'+oi+'"><span class="lk">'+lab+'</span><span class="lt">'+esc(o)+'</span></div>';
    }).join("");
  }

  function appEl(){ return document.getElementById("app"); }

  // 局部更新：避免整题 innerHTML 重建导致的布局跳动
  function paintOptions(q){
    var graded = !!state.graded[q.id];
    var cur = state.sel[q.id];
    var corr = correctIdx(q);
    var isMulti = q.type==="multi";
    var opts = appEl().querySelectorAll(".q .opt");
    for(var i=0;i<opts.length;i++){
      var el = opts[i];
      var oi = parseInt(el.getAttribute("data-opt"),10);
      var selected = isMulti ? (cur && cur.indexOf(oi)>=0) : (cur===oi);
      var cls = "opt";
      if(graded){
        if(corr.indexOf(oi)>=0) cls += " ok";
        else if(selected) cls += " no";
      } else if(selected){
        cls += " on";
      }
      el.className = cls;
    }
  }
  function showFeedback(q){
    var fb = appEl().querySelector(".q .fb");
    if(state.graded[q.id]){
      var isCor = grade(q, state.sel[q.id]);
      var html = '<div class="fb '+(isCor?"ok":"no")+'">'+(isCor?"回答正确":"回答错误")+
                 ' · 正确答案：'+esc(answerText(q))+'</div>';
      if(fb){
        var tmp = document.createElement("div"); tmp.innerHTML = html;
        fb.parentNode.replaceChild(tmp.firstChild, fb);
      } else {
        var acts = appEl().querySelector(".q .acts");
        if(acts) acts.insertAdjacentHTML("beforebegin", html);
      }
    } else if(fb){ fb.parentNode.removeChild(fb); }
  }
  function renderActions(q){
    var acts = appEl().querySelector(".q .acts");
    if(!acts) return;
    var graded = !!state.graded[q.id];
    var html = "";
    if(graded){ html = '<button class="btn primary" data-act="next">下一题</button>'; }
    else if(q.type==="multi"){
      var has = state.sel[q.id] && state.sel[q.id].length>0;
      html = '<button class="btn primary" data-act="confirm"'+(has?'':' disabled style="opacity:.45;cursor:not-allowed;"')+'>确认本题</button>';
    } else { html = ''; }
    acts.innerHTML = html + '<button class="btn ghost" data-act="exit">保存并退出</button>';
  }

  function renderStart(){
    var wn = loadWrong().length;
    var p = loadProgress();
    var chip = function(v,label){ return '<span class="chip'+(state.filter===v?" on":"")+'" data-act="filter" data-v="'+v+'">'+label+'</span>'; };
    var app = document.getElementById("app");
    app.innerHTML =
      '<h1 class="page-title">监护培训考核 · 刷题</h1>'+
      '<p class="page-sub">题目来源：监护培训考核题库（单选/多选/判断 共 24 题）</p>'+
      '<div class="modnav"><a href="../">刷题目录</a><a href="../wuxiandian/">业余无线电刷题</a><span class="cur">监护刷题</span></div>'+
      '<div class="notebox">首页可切换 <b>题型</b> 与 <b>模式</b>；进度自动保存到本机，可「继续上次」。开启 <b>自动朗读</b> 后每题进入会朗读题干，<b>判分后会自动朗读正确答案</b>。</div>'+
      '<div class="section-h">题型</div><div class="chips">'+
        chip("all","全部")+chip("single","单选")+chip("multi","多选")+(TYPE_ZH.bool?chip("bool","判断"):'')+'</div>'+
      '<div class="section-h">模式</div><div class="chips">'+
        '<span class="chip'+(state.shuffle?" on":"")+'" data-act="toggle-shuffle">乱序：'+(state.shuffle?"开":"关")+'</span>'+
        '<span class="chip'+(state.autoRead?" on":"")+'" data-act="toggle-autoread">自动朗读：'+(state.autoRead?"开":"关")+'</span></div>'+
      '<div class="acts">'+
        (p? '<button class="btn" data-act="resume">继续上次（第 '+Math.min(p.idx+1, p.qids.length)+' / '+p.qids.length+' 题）</button>':'')+
        '<button class="btn primary" data-act="start">'+(p?'重新开始':'开始刷题')+'</button>'+
        (wn? '<button class="btn ghost" data-act="wrong">重练错题（'+wn+'）</button>':'')+
      '</div>'+
      (p? '<p class="hint">已为你保存上次进度，可「继续上次」或「重新开始」。</p>':'')+
      recentHint();
  }

  function renderQuiz(){
    var app = document.getElementById("app");
    if(!state.list.length){ app.innerHTML='<div class="empty">该题型暂无题目。</div>'; return; }
    var q = state.list[state.idx];
    var autoFire = state.autoRead && state.lastReadId !== q.id;
    var total = state.list.length;
    var graded = state.graded[q.id];
    var fb = "";
    if(graded){
      var isCor = grade(q, state.sel[q.id]);
      fb = '<div class="fb '+(isCor?"ok":"no")+'">'+(isCor?"回答正确":"回答错误")+
           ' · 正确答案：'+esc(answerText(q))+'</div>';
    }
    var hint = "";
    var actBtn;
    if(graded){
      actBtn = '<button class="btn primary" data-act="next">下一题</button>';
    } else if(q.type==="multi"){
      hint = '<div class="hint">本题为多选，勾选多个选项后点「确认本题」判分</div>';
      var has = state.sel[q.id] && state.sel[q.id].length>0;
      actBtn = '<button class="btn primary" data-act="confirm"'+((has)?"":" disabled style=\"opacity:.45;cursor:not-allowed;\"")+'>确认本题</button>';
    } else {
      hint = '<div class="hint">点击选项即可自动判分</div>';
      actBtn = '';
    }
    var readNote = (!speechOK) ? '<div class="hint">当前浏览器不支持语音朗读，可手动阅读题干。</div>'
                  : (state.autoRead
                      ? '<div class="hint">已开启自动朗读（移动端需先点击一次解锁声音）；判分后会自动朗读正确答案。</div>'
                      : '<div class="hint">判分后会自动朗读正确答案；可在首页开启「自动朗读」让每题先读题干。</div>');
    app.innerHTML =
      '<div class="bar"><div class="meta">第 '+(state.idx+1)+' / '+total+' 题 · '+TYPE_ZH[q.type]+'</div>'+
        '<div class="score">答对 '+state.correct+' · 答错 '+state.wrong+'</div></div>'+
      '<div class="prog"><div class="fill" style="width:'+(100*(state.idx+1)/total)+'%"></div></div>'+
      '<div class="q"><div class="qt">'+esc(q.q)+'</div>'+
        '<button class="btn read'+(state.reading||autoFire?' on':'')+'" data-act="read"'+(speechOK?'':' disabled style="opacity:.45;cursor:not-allowed;" title="当前浏览器不支持语音朗读"')+'>'+(state.reading||autoFire?'停止朗读':'朗读题干')+'</button>'+
        readNote+
        '<div class="opts">'+hint+optHtml(q)+'</div>'+
        (graded?fb:'')+
        '<div class="acts">'+actBtn+'<button class="btn ghost" data-act="exit">保存并退出</button></div>'+
      '</div>';
    if(autoFire){
      state.lastReadId = q.id; state.reading = true;
      // 延迟触发，确保处于用户手势窗口内且 DOM 已绘制
      setTimeout(function(){
        if(state.graded[q.id]) return; // 用户已在该题判分，改读答案，不再读题干
        readAloud(q.q);
      }, 80);
    }
  }

  function renderSummary(){
    recordAttempt();
    var app = document.getElementById("app");
    clearProgress();
    var total = state.list.length;
    var acc = total? Math.round(100*state.correct/total):0;
    var wrongItems = state.list.filter(function(q){ return !grade(q, state.sel[q.id]); })
      .map(function(q){
        return '<div class="wrong-item"><div class="wq">'+esc(q.q)+'</div>'+
               '<div class="wa">正确答案：'+esc(answerText(q))+'</div></div>';
      }).join("");
    app.innerHTML =
      '<div class="modnav"><a href="../">刷题目录</a><a href="../wuxiandian/">业余无线电刷题</a><span class="cur">监护刷题</span></div>'+
      '<div class="sum"><div class="big">'+acc+'%</div>'+
        '<div class="row"><span>共 <b>'+total+'</b> 题</span><span>答对 <b>'+state.correct+'</b></span>'+
          '<span>答错 <b>'+state.wrong+'</b></span></div>'+
        (wrongItems?'<div class="wrong-list"><div class="section-h">错题回顾</div>'+wrongItems+'</div>':'<p class="page-sub">全部答对，干得漂亮。</p>')+
        '<div class="acts">'+
          '<button class="btn primary" data-act="again">再来一次</button>'+
          '<button class="btn ghost" data-act="home">返回首页</button>'+
        '</div></div>';
  }

  function render(){
    if(state.phase==="start"){ renderStart(); return; }
    if(state.phase==="summary"){ renderSummary(); return; }
    renderQuiz();
  }

  function matchSet(q, arr){
    var S = arr.map(letterOf).sort().join("");
    var C = q.answer.slice().sort().join("");
    return S === C;
  }

  function onClick(e){
    var t = e.target.closest ? e.target.closest("[data-act],[data-opt]") : null;
    if(!t) return;
    e.preventDefault();
    try {
      unlockSpeech();
      var _act0 = t.getAttribute("data-act");
      if(_act0 !== "read"){ stopRead(); state.reading = false; }
      var optAttr = t.getAttribute("data-opt");
      if(optAttr!=null){
        var q = state.list[state.idx];
        if(state.graded[q.id]) return; // 已判分则忽略，避免重复
        var oi = parseInt(optAttr,10);
        if(q.type==="multi"){
          var arr = state.sel[q.id] || [];
          var k = arr.indexOf(oi);
          if(k>=0) arr.splice(k,1); else arr.push(oi);
          state.sel[q.id] = arr;
          // 仅局部更新该选项样式 + 提交按钮状态，不重建整题
          var el = appEl().querySelector('.q .opt[data-opt="'+oi+'"]');
          if(el) el.className = "opt" + (arr.indexOf(oi)>=0 ? " on" : "");
          renderActions(q);
        } else {
          state.sel[q.id] = oi;
          doGrade(q);
          // 局部更新：选项对/错样式、反馈区、操作按钮
          paintOptions(q);
          showFeedback(q);
          renderActions(q);
          readAnswer(q);
        }
        saveProgress();
        return;
      }
      var act = t.getAttribute("data-act");
      if(act==="filter"){ state.filter = t.getAttribute("data-v"); render(); }
      else if(act==="toggle-shuffle"){ state.shuffle=!state.shuffle; render(); }
      else if(act==="toggle-autoread"){ state.autoRead=!state.autoRead; saveAutoRead(); render(); }
      else if(act==="start"){ clearProgress(); state.phase="quiz"; buildList(false); render(); }
      else if(act==="wrong"){
        if(!loadWrong().length){ return; }
        clearProgress(); state.phase="quiz"; buildList(true); render();
      }
      else if(act==="resume"){
        var p = loadProgress(); if(!p) return;
        state.list = p.qids.map(function(id){ return QBANK.find(function(q){ return q.id===id; }); }).filter(Boolean);
        if(!state.list.length) return;
        state.idx = Math.min(p.idx||0, state.list.length-1);
        state.sel = p.sel || {}; state.graded = p.graded || {};
        state.correct = p.correct||0; state.wrong = p.wrong||0;
        state.filter = p.filter; state.shuffle = p.shuffle;
        state.phase="quiz"; state.lastReadId=null; render();
      }
      else if(act==="confirm"){
        var qc = state.list[state.idx];
        if(state.graded[qc.id]) return;
        if(!(state.sel[qc.id] && state.sel[qc.id].length>0)) return;
        doGrade(qc);
        paintOptions(qc); showFeedback(qc); renderActions(qc);
        readAnswer(qc);
        saveProgress();
      }
      else if(act==="next"){
        state.idx++;
        if(state.idx >= state.list.length){ state.phase="summary"; render(); }
        else { render(); }
        saveProgress();
      }
      else if(act==="again"){ clearProgress(); state.phase="quiz"; buildList(false); render(); }
      else if(act==="home"){ clearProgress(); state.phase="start"; render(); }
      else if(act==="exit"){ state.phase="start"; render(); }
      else if(act==="read"){
        if(state.reading){ stopRead(); state.reading = false; renderReadBtn(); }
        else { readAloud(state.list[state.idx].q); state.reading = true; state.lastReadId = state.list[state.idx].id; renderReadBtn(); }
      }
    } catch(err){
      document.getElementById("app").innerHTML = '<div class="empty">交互出错：'+esc(String(err&&err.message||err))+'</div>';
    }
  }
  document.addEventListener("click", onClick);
  render();
  // 供 PeixunAuth.init() 切换云端后端后重渲染（修复：登录用户刷新后从云端读回进度）
  window.__peixunReRender = render;
})();
</script>
<script src="../auth.js"></script>
<script>if(window.PeixunAuth&&window.SupabaseBackend)PeixunAuth.init();</script>
