<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寰宇零售集团 · 内部职位与周报站</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- 页头 -->
  <header class="site-head">
    <div class="shell">
      <div class="brand">
        <div class="mark">GS</div>
        <div class="names">
          <div class="zh">寰宇零售集团</div>
          <div class="en">GlobalSphere Retail Group</div>
        </div>
      </div>
      <div class="tagline">连接全球市场，服务每一位顾客</div>
    </div>
  </header>

  <!-- 顶部主导航 -->
  <nav class="nav">
    <div class="shell" id="nav"></div>
  </nav>

  <!-- 主体 -->
  <div class="layout" id="layout">
    <aside class="side" id="side"></aside>
    <main class="main" id="main"></main>
  </div>

  <!-- 页脚 -->
  <footer class="foot">
    <div class="shell">
      <span>寰宇零售集团 · 内部职位介绍与每周工作报告系统</span>
      <span>仅限集团内部使用 · 数据为演示样例</span>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
